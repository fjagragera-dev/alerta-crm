name: Alerta CRM

on:
  schedule:
    - cron: "*2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alerta-crm
  cancel-in-progress: false

jobs:
  alerta:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      CRM_EMAIL: ${{ secrets.CRM_EMAIL }}
      CRM_PASSWORD: ${{ secrets.CRM_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python alerta_crm.py

      - name: Guardar leads vistos
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Actualizar leads vistos
          file_pattern: seen_leads.json
